name: Deploy to Firebase Hosting

'on':
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # CRITICAL: Go into frontend folder first
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      # CRITICAL: Build from frontend folder
      - name: Build
        run: |
          cd frontend
          npm run build
      
      # Verify build exists (debugging)
      - name: List build output
        run: |
          ls -la frontend/build/
      
      # Deploy with entryPoint pointing to frontend
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_YOUR_PROJECT }}'
          projectId: your-project-id-here
          channelId: live
          entryPoint: './frontend'  # Tells Firebase where firebase.json is